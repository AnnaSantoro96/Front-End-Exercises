<!DOCTYPE html>
<html>
    <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="home.css">
    <title>Form</title>
</head>
<body>
    <h1>Registration Form</h1>
    <p>Please fill out this form with the required information</p>

    <form method="post" action="">
        <fieldset>
            <label for="firstName">
                Enter Your First Name:
                <input type="text" id="firstName" name="firstName" required>
            </label>

            <label for="lastName">
                Enter Your Last Name:
                <input type="text" id="lastName" name="lastName" required>
            </label>

            <label for="email">
                Enter Your Email:
                <input type="email" id="email" name="email" required>
            </label>

            <label for="password">
                Create a Password:
                <input type="password" id="password" name="password" required pattern="[a-z0-5]{8,}"> 
            </label>
        </fieldset>

        <fieldset>
            <legend>Account type (Required)</legend>
            <label for="personalAccount">
                <input type="radio" id="personalAccount" name="personalAccount" value="personal" class="inline" checked>Personal 
            </label>
            <label for="businessAccount">
                <input type="radio" id="businessAccount" name="businessAccount" value="business" class="inline" checked>Business
            </label>
        </fieldset>

        <fieldset>
            <label for="profile-picture">
                Upload a profile picture:
                <input type="file" id="profile-picture" name="file"> 
            </label>
            <label for="age">
                Input your age (years):
                <input type="number" id="age" name="age" min="13" max="120">
            </label>
            <label for="referrer">
                How did you hear about us?
                <select if="referrer" name="referrer">
                    <option value="">(Select one)</option>
                    <option value="1">FreeCodeCamp News</option>
                    <option value="2">FreeCodeCamp YouTube Channel</option>
                    <option value="3">FreeCodeCamp Forum</option>
                    <option value="4">Other</option>
                </select>
            </label> 
            <label for="bio">
                Provide a bio:
                <textarea id="bio" name="bio" rows="3" cols="30" placeholder="I like coding on the beach..."></textarea>
            </label>
        </fieldset>
        <a href="https://www.freecodecamp.org/news/terms-of-service">Read our terms and conditions</a>
        <label for="terms-and-conditions">
            <input class="inline" name="terms" id="terms-and-conditions" type="checkbox" required />
      I accept the terms and conditions
        </label>
        <input type="submit" value="Submit" />
    </form>
</body>
</html>
